<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You Heart</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

.particle {
  position: absolute;
  color: #ff2d55;
  font-size: 10px;
  pointer-events: none;
  will-change: transform;
  text-shadow: 0 0 8px #ff2d55, 0 0 20px #ff004c;
  white-space: nowrap;
}
</style>
</head>

<body>

<script>
const particles = [];
const count = 220;

function heartX(t) {
  return 16 * Math.pow(Math.sin(t), 3);
}

function heartY(t) {
  return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
}

// create particles
for (let i = 0; i < count; i++) {
  const el = document.createElement("div");
  el.className = "particle";
  el.textContent = "I love you";
  document.body.appendChild(el);

  const t = Math.random() * Math.PI * 2;

  particles.push({
    el,
    tx: heartX(t) * 18 + window.innerWidth / 2,
    ty: heartY(t) * 18 + window.innerHeight / 2,
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight
  });
}

let time = 0;

function animate() {
  time += 0.03;

  const pulse =
    1 +
    0.08 * Math.sin(time * 3) +
    0.04 * Math.sin(time * 6);

  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;

  particles.forEach((p, i) => {

    p.x += (p.tx - p.x) * 0.05;
    p.y += (p.ty - p.y) * 0.05;

    const breathe = 1 + 0.02 * Math.sin(time * 2 + i);

    const x = cx + (p.x - cx) * pulse * breathe;
    const y = cy + (p.y - cy) * pulse * breathe;

    p.el.style.transform = `translate(${x}px, ${y}px)`;

    const glow = 12 + 10 * Math.sin(time * 3);
    p.el.style.textShadow = `
      0 0 ${glow}px #ff2d55,
      0 0 ${glow * 2}px #ff004c
    `;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
